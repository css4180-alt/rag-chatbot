# fly.toml app configuration file generated for rag-chatbot-bold-dream-143 on 2026-05-28T22:59:49+09:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'rag-chatbot-bold-dream-143'
primary_region = 'nrt'

# 임베딩 모델 로딩 시 메모리 스파이크 대비
swap_size_mb = 1024

[build]

[[mounts]]
  source = 'rag_chatbot_data'
  destination = '/app/data'

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
  memory = '2gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 2048
